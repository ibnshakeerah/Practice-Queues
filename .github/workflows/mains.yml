name: Node.js CI Pipeline

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Lint code
      - name: Run ESLint
        run: npx eslint . || true   # Optional: fail workflow if lint errors

      # Step 5: Run tests
      - name: Run tests
        run: npm test

      # Step 6: Build project
      - name: Build project
        run: npm run build
